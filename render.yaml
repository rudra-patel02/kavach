services:
  - type: web
    name: kavach-backend
    runtime: node
    rootDir: backend
    plan: starter
    buildCommand: npm ci --omit=dev
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: ADMIN_REPAIR_KEY
        sync: false
      - key: CORS_ORIGIN
        value: https://kavach-1-7749.onrender.com
      - key: CORS_CREDENTIALS
        value: "true"
      - key: MONGO_CONNECT_ATTEMPTS
        value: "5"
      - key: MONGO_CONNECT_RETRY_MS
        value: "5000"
      - key: IOT_ENABLED
        value: "false"
      - key: ENABLE_SENSOR_SIMULATION
        value: "false"
      - key: DEVICE_SECRET
        sync: false
