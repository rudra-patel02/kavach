services:
  - type: web
    name: kavach-backend
    runtime: node
    rootDir: backend
    plan: starter
    buildCommand: npm ci --omit=dev
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_VERSION
        value: "1.0.0"
      - key: MONGO_URI
        sync: false
      - key: MONGO_MAX_POOL_SIZE
        value: "20"
      - key: MONGO_MAX_IDLE_TIME_MS
        value: "60000"
      - key: MONGO_SERVER_SELECTION_TIMEOUT_MS
        value: "10000"
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: CORS_CREDENTIALS
        value: "true"
      - key: PUBLIC_API_BASE_URL
        sync: false
      - key: MONGO_CONNECT_ATTEMPTS
        value: "5"
      - key: MONGO_CONNECT_RETRY_MS
        value: "5000"
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX
        value: "600"
      - key: AUTH_RATE_LIMIT_MAX
        value: "25"
      - key: BRUTE_FORCE_WINDOW_MS
        value: "900000"
      - key: BRUTE_FORCE_MAX_FAILURES
        value: "8"
      - key: COMPRESSION_THRESHOLD_BYTES
        value: "1024"
      - key: IOT_ENABLED
        value: "false"
      - key: ENABLE_SENSOR_SIMULATION
        value: "false"
      - key: DEVICE_OFFLINE_AFTER_MS
        value: "120000"
      - key: DEVICE_HEARTBEAT_MONITOR_MS
        value: "30000"
      - key: DEVICE_SECRET
        sync: false
