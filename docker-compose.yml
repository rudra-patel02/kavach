services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - kavach-mongo:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/kavach
      JWT_SECRET: replace-with-a-random-secret-at-least-32-characters-long
      JWT_REFRESH_SECRET: replace-with-a-second-random-secret-at-least-32-characters
      CORS_ORIGIN: http://localhost:3000
      ENABLE_SENSOR_SIMULATION: "true"
      SENSOR_INTERVAL_MS: 1500
      ENERGY_COST_PER_KWH: "0.12"
      CARBON_KG_PER_KWH: "0.42"
      COMPANY_NAME: KAVACH Industrial Operations
      COMPANY_SITE: Primary Plant
    ports:
      - "5000:5000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:5000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5000
        NEXT_PUBLIC_SOCKET_URL: http://localhost:5000
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:5000
      NEXT_PUBLIC_SOCKET_URL: http://localhost:5000
    ports:
      - "3000:3000"

volumes:
  kavach-mongo:
