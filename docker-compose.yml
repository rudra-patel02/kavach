services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - kavach-mongo:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/kavach
      JWT_SECRET: replace-with-a-random-secret-at-least-32-characters-long
      JWT_REFRESH_SECRET: replace-with-a-second-random-secret-at-least-32-characters
      CORS_ORIGIN: ${FRONTEND_ORIGIN:-http://frontend:3000}
      ENABLE_SENSOR_SIMULATION: "true"
      SENSOR_INTERVAL_MS: 1500
      IOT_ENABLED: "true"
      MQTT_BROKER_URL: mqtt://mqtt:1883
      MQTT_CLIENT_ID: kavach-backend
      MQTT_KEEPALIVE: "60"
      DEVICE_SECRET: replace-with-device-shared-secret
      ENERGY_COST_PER_KWH: "0.12"
      CARBON_KG_PER_KWH: "0.42"
      COMPANY_NAME: KAVACH Industrial Operations
      COMPANY_SITE: Primary Plant
    ports:
      - "5000:5000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://0.0.0.0:5000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:5000}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://backend:5000}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:5000}
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://backend:5000}
    ports:
      - "3000:3000"

  mqtt:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./deployment/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/kavach.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  kavach-mongo:
