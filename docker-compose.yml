# KAVACH single-host deployment. The ONLY published port is nginx:80 — the API,
# Socket.IO, the Next.js app, Mongo and the MQTT broker all live on the internal
# compose network and are never exposed to the host. Secrets are injected from a
# local .env (see .env.example); no placeholder secret is baked in, and the
# backend's boot guard refuses to start on a placeholder/short secret or a
# wildcard CORS origin.

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:?set MONGO_ROOT_USERNAME in .env}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?set MONGO_ROOT_PASSWORD in .env}
    volumes:
      - kavach-mongo:/data/db
    # No published ports: reachable only on the internal network, with auth.
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "5000"
      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/kavach?authSource=admin
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET in .env}
      DEVICE_SECRET: ${DEVICE_SECRET:?set DEVICE_SECRET in .env}
      CORS_ORIGIN: ${PUBLIC_ORIGIN:-http://localhost}
      ENABLE_SENSOR_SIMULATION: ${ENABLE_SENSOR_SIMULATION:-false}
      SENSOR_INTERVAL_MS: "1500"
      IOT_ENABLED: ${IOT_ENABLED:-true}
      MQTT_BROKER_URL: mqtt://mqtt:1883
      MQTT_CLIENT_ID: kavach-backend
      MQTT_KEEPALIVE: "60"
    # No published ports: the API is reached only through nginx (/api).
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:5000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        # Baked into the client bundle at build time. Points at the public
        # origin so the browser calls same-origin /api + /socket.io, which nginx
        # proxies to the backend. Override PUBLIC_ORIGIN for your real domain.
        NEXT_PUBLIC_API_URL: ${PUBLIC_ORIGIN:-http://localhost}
        NEXT_PUBLIC_SOCKET_URL: ${PUBLIC_ORIGIN:-http://localhost}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3000"
    # No published ports: served only through nginx (/).

  mqtt:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    volumes:
      - ./deployment/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    # Internal only. To ingest from external devices, deliberately publish 1883
    # AND enable broker authentication in mosquitto.conf.

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/kavach.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  kavach-mongo:
